<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escala Militar</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <main class="login-main">
        <form id="loginForm">
            <h2>Login</h2>

            <label>Usuário:</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário" required>

            <label>Senha:</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>

            <div class="checkbox">
                <input type="checkbox" id="lembrar"> <label>Lembrar-me</label>
            </div>

            <button class="botoes" type="submit">Entrar</button>
            <button class="btnRecupsenha" type="button" onclick="recuperarSenha()">Recuperar Senha</button>
        </form>
    </main>

    <script src="script.js"></script>

</body>

</html>
