<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala de Serviço</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="goHome()">Aditamento Online</div>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Cadastrar</a></li>
            <li><a href="#">Lista</a></li>
        </ul>
    </nav>

    <div class="user-info">
        <img src="https://via.placeholder.com/40">
        <span id="usuarioNome"></span>
    </div>
</header>

<main>
    <section>
        <h2>Cadastro de Serviço</h2>

        <form id="form">
            <input type="hidden" id="indexEdit">

            <label>Número de Guerra:</label>
            <input type="text" id="numero" required>

            <label>Nome de Guerra:</label>
            <input type="text" id="nome" required>

            <label>Companhia:</label>
            <input type="text" id="companhia" required>

            <label>Data do Serviço:</label>
            <input type="date" id="data" required>

            <button class="botoes" type="submit">Salvar</button>
            <button class="botoes" type="button" onclick="limpar()">Cancelar</button>
        </form>
    </section>

    <section>
        <h2>Lista de Serviços</h2>
        <table>
        <thead>
        <tr>
        <th>Nº Guerra</th>
        <th>Nome</th>
        <th>Companhia</th>
        <th>Data</th>
        <th>Ações</th>
        </tr>
        </thead>

        <tbody id="tabela"></tbody>
        </table>
    </section>
</main>

<footer>
    <p>Equipe: Henrique Eberhardt e Carlos Alfredo Isensee</p>
</footer>

<script src="script.js"></script>

</body>
</html>
