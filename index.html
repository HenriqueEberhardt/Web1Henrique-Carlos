<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala de Serviço</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="iconMenu.svg">
    <img class="logo" onclick="goHome()" src="exercito-brasileiro-logo-png_seeklogo-50803-removebg-preview.png">
    <h1>Aditamento Online</h1>

    <div id="menu">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Cadastrar</a></li>
                <li><a href="#">Lista</a></li>
            </ul>
        </nav>
    </div>

    <div class="infoUsuario">
        <span id="usuarioNome"></span>
    </div>
</header>

<main>
    <section id="formCadastro">
        <h2 class="titulosIndex">Cadastro de Serviço</h2>

        <form id="form">
            <input type="hidden" id="indexEdit">

            <label>Número de Guerra:</label>
            <input type="text" id="numero" placeholder="26XXX" required>

            <label>Nome de Guerra:</label>
            <input type="text" id="nome" placeholder="SAFONILDO" required>

            <label for="companhia">Companhia:</label>

            <input list="lista-companhias" id="companhia" name="companhia">

            <datalist id="lista-companhias">
                <option value="CCAP">
                <option value="Primeira Companhia">
                <option value="Segunda Companhia">
                <option value="CFGS">
                <option value="NPOR">
            </datalist>

            <label>Data do Serviço:</label>
            <input type="date" id="data" required>

            <button class="botoesIndex" type="submit">Salvar</button>
            <button class="botoesIndex" type="button" onclick="limpar()">Cancelar</button>
        </form>
    </section>

    <section>
        <h2 class="titulosIndex">Lista de Serviços</h2>
        <table>
        <thead>
        <tr>
        <th>Nº Guerra</th>
        <th>Nome</th>
        <th>Companhia</th>
        <th>Data</th>
        <th>Ações</th>
        </tr>
        </thead>

        <tbody id="tabela"></tbody>
        </table>
    </section>
</main>

<footer>
    <p>Equipe: Henrique Eberhardt e Carlos Alfredo Isensee</p>
</footer>

<script src="script.js"></script>

</body>
</html>
